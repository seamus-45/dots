[general]
live_config_reload = true

import = [
    "~/.config/alacritty/themes/dracula.toml"
]

[cursor.style]
shape = "Block"

[env]
TERM = "xterm-256color"

[font]
size = 12.0

[font.bold]
family = "DroidSansM Nerd Font"

[font.italic]
family = "DroidSansM Nerd Font"

[font.normal]
family = "DroidSansM Nerd Font"

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
command = "xdg-open"
post_processing = true
regex = "(mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key = "U"
mods = "Control|Shift"

[hints.enabled.mouse]
enabled = true

[mouse]
hide_when_typing = true

[scrolling]
history = 10000

[window]
decorations = "none"
dynamic_title = true
opacity = 1
startup_mode = "Windowed"
title = "Alacritty"

[keyboard]
bindings = [
{ key = "Enter", mods = "Control", chars = "\u001b[[CE" },
]
